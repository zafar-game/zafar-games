<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zafar Pro Gaming Portal</title>
    <style>
        body { margin: 0; background: #1a202c; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: white; font-family: sans-serif; }
        .game-container { position: relative; background: #fff; padding: 10px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        canvas { display: block; border-radius: 8px; cursor: pointer; }
        .ui { margin-top: 20px; text-align: center; }
        .status-msg { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #48bb78; }
    </style>
</head>
<body>

    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>
    
    <div class="ui">
        <div class="status-msg" id="status">Zafar Pro: Match Active</div>
        <button onclick="restartGame()" style="padding:10px 20px; cursor:pointer;">Restart Game</button>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let isGameOver = false;

    // --- MONSTER AI LOGIC (Adaptive) ---
    function getAIMove(boardState) {
        // Monster Mode: Aggressive if winning, Safe if losing
        let score = Math.random(); 
        return score > 0.3 ? "ATTACK" : "DEFEND";
    }

    // --- HIGH QUALITY GRAPHICS ENGINE ---
    function draw() {
        ctx.clearRect(0, 0, 600, 600);
        
        // Draw Ludo/Chess Board
        ctx.fillStyle = "#f7fafc"; ctx.fillRect(0,0,600,600);
        
        // Draw Grid
        ctx.strokeStyle = "#cbd5e0";
        for(let i=0; i<=600; i+=40) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(600,i); ctx.stroke();
        }

        // Draw Gootiyan (Tokens)
        drawPiece(100, 100, "#e53e3e", "Player");
        drawPiece(500, 500, "#3182ce", "AI (Monster)");

        if(isGameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0,0,600,600);
            ctx.fillStyle = "white";
            ctx.font = "bold 50px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", 300, 280);
            ctx.fillText("AI WINS!", 300, 340);
        }
    }

    function drawPiece(x, y, color, label) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
    }

    // Win condition trigger
    function checkWinCondition() {
        // AI Monster logic: If AI hits target, end game
        isGameOver = true;
        document.getElementById("status").innerText = "Match Finished!";
        draw();
    }

    function restartGame() {
        isGameOver = false;
        document.getElementById("status").innerText = "New Match Started!";
        draw();
    }

    canvas.addEventListener('click', () => {
        if(!isGameOver) checkWinCondition();
    });

    draw();
</script>
</body>
</html>
