<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zafar Pro Gaming | Premium AI</title>
    <style>
        body { margin: 0; background: #1a202c; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        canvas { border: 8px solid #2d3748; border-radius: 12px; background: #fff; cursor: pointer; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .ui-panel { margin-top: 20px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; background: #48bb78; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #38a169; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="600" height="600"></canvas>
    
    <div class="ui-panel">
        <h2 id="status">Zafar Pro Ludo/Chess AI</h2>
        <button onclick="resetGame()">Restart Match</button>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- PREMIUM GRAPHICS ENGINE ---
    function drawBoard() {
        // Ludo Background (Classic 4-color layout)
        const size = 600;
        const box = size / 15;
        
        // Filling quadrants
        ctx.fillStyle = "#e53e3e"; ctx.fillRect(0,0, box*6, box*6); // Red
        ctx.fillStyle = "#38a169"; ctx.fillRect(box*9, 0, box*6, box*6); // Green
        ctx.fillStyle = "#ecc94b"; ctx.fillRect(0, box*9, box*6, box*6); // Yellow
        ctx.fillStyle = "#3182ce"; ctx.fillRect(box*9, box*9, box*6, box*6); // Blue
        
        // Draw Center Home
        ctx.fillStyle = "#2d3748";
        ctx.beginPath();
        ctx.moveTo(box*6, box*6); ctx.lineTo(box*9, box*6); ctx.lineTo(box*7.5, box*7.5); ctx.fill();
    }

    // --- SMART TOKEN RENDERER ---
    function drawToken(x, y, color) {
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.closePath();
    }

    // --- GAME LOGIC & VICTORY SYSTEM ---
    let gameState = { playerPos: 0, aiPos: 0, isGameOver: false };

    function render() {
        ctx.clearRect(0,0,600,600);
        drawBoard();
        
        // Drawing tokens at specific coordinates
        drawToken(100, 100, "#e53e3e"); // Player
        drawToken(500, 500, "#3182ce"); // AI
        
        if(gameState.isGameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0,0,600,600);
            ctx.fillStyle = "white";
            ctx.font = "40px Arial";
            ctx.fillText("GAME OVER! Winner is AI.", 100, 300);
        }
    }

    function resetGame() {
        gameState.isGameOver = false;
        document.getElementById("status").innerText = "Match Started!";
        render();
    }

    // Trigger Win Condition Logic
    function checkWin(pos) {
        if(pos >= 50) {
            gameState.isGameOver = true;
            document.getElementById("status").innerText = "Winner Declared!";
            render();
        }
    }

    render();
</script>
</body>
</html>
