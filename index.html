<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub: Chess AI Pro & Snake Live</title>
    <!-- Combined Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chess dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0b10;
            --panel-bg: rgba(20, 22, 37, 0.6);
            --neon-blue: #00f3ff;
            --neon-pink: #ff007f;
            --text-light: #f5f6fa;
            --border-glow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1c2e 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .tab-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .tab-btn {
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: #fff;
            border: 2px solid var(--neon-blue);
            padding: 12px 30px;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: var(--border-glow);
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 25px var(--neon-blue);
            font-weight: bold;
        }

        .game-wrapper {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            margin-bottom: 50px;
        }

        @media (max-width: 950px) {
            .game-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .game-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: none;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .game-card.active {
            display: flex;
        }

        /* Snake Styles */
        #snake-canvas {
            background: #05060c;
            border: 3px solid var(--neon-pink);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            max-width: 100%;
        }

        .score-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink);
        }

        /* Chess Custom Overrides */
        #chess-board {
            width: 450px;
            max-width: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
            border: 3px solid var(--neon-blue);
        }

        .status-box {
            margin-top: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Leaderboard & Panel Sidebar */
        .side-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: var(--neon-blue);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th {
            text-align: left;
            padding: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: #8a8f9d;
        }

        .leaderboard-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
        }

        .leaderboard-table tr:nth-child(1) td { color: #ffd700; font-weight: bold; }
        .leaderboard-table tr:nth-child(2) td { color: #c0c0c0; font-weight: bold; }
        .leaderboard-table tr:nth-child(3) td { color: #cd7f32; font-weight: bold; }

        /* Mobile Controls */
        .dpad-container {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            margin-top: 20px;
        }

        .dpad-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--neon-pink);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,0,127,0.2);
            transition: all 0.2s ease;
        }

        .dpad-btn:active {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        #dpad-up { grid-column: 2; grid-row: 1; }
        #dpad-left { grid-column: 1; grid-row: 2; }
        #dpad-right { grid-column: 3; grid-row: 2; }
        #dpad-down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-gamepad"></i> Cyber Arcade</h1>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('snake')"><i class="fas fa-snake"></i> Snake Game</button>
        <button class="tab-btn" onclick="switchTab('chess')"><i class="fas fa-chess"></i> Chess AI Pro</button>
    </div>

    <div class="game-wrapper">
        <!-- Main Game Area -->
        <main>
            <!-- Snake Area -->
            <div id="snake-card" class="game-card active">
                <div class="score-box">Score: <span id="snake-score">0</span></div>
                <canvas id="snake-canvas" width="400" height="400"></canvas>
                
                <!-- D-Pad for Mobile Players -->
                <div class="dpad-container">
                    <button class="dpad-btn" id="dpad-up"><i class="fas fa-chevron-up"></i></button>
                    <button class="dpad-btn" id="dpad-left"><i class="fas fa-chevron-left"></i></button>
                    <button class="dpad-btn" id="dpad-right"><i class="fas fa-chevron-right"></i></button>
                    <button class="dpad-btn" id="dpad-down"><i class="fas fa-chevron-down"></i></button>
                </div>
            </div>

            <!-- Chess Area -->
            <div id="chess-card" class="game-card">
                <div id="chess-board"></div>
                <div class="status-box" id="chess-status">Aapki Chaal (White)</div>
            </div>
        </main>

        <!-- Sidebar Panel for Live Leaderboard -->
        <aside class="side-panel">
            <h2 class="panel-title"><i class="fas fa-trophy"></i> Global Top Players</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="3" style="text-align:center; color:#666;">Loading leaderboard...</td></tr>
                </tbody>
            </table>
        </aside>
    </div>

    <!-- Scripts Integration -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        // TAB SWITCHER SYSTEM
        function switchTab(game) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
            
            if(game === 'snake') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('snake-card').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('chess-card').classList.add('active');
                initChess(); // Initialize board when tab is opened
            }
        }

        // --- LOCAL STORAGE BACKEND SECURE LEADERBOARD SYSTEM ---
        const FALLBACK_BOX_ID = "cyberarcade_leaderboard_v1";

        function getLocalLeaderboard() {
            let scores = localStorage.getItem(FALLBACK_BOX_ID);
            return scores ? JSON.parse(scores) : [
                {name: "AlphaBot", score: 45},
                {name: "CyberKnight", score: 32},
                {name: "NeonGamer", score: 20}
            ];
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            
            let data = getLocalLeaderboard();
            data.sort((a, b) => b.score - a.score);
            data = data.slice(0, 7); // Display top 7 players

            data.forEach((player, index) => {
                let medal = index === 0 ? "🥇 " : index === 1 ? "🥈 " : index === 2 ? "🥉 " : `${index + 1}`;
                tbody.innerHTML += `
                    <tr>
                        <td>${medal}</td>
                        <td>${player.name}</td>
                        <td>${player.score}</td>
                    </tr>
                `;
            });
        }

        function saveScore(playerName, playerScore) {
            let currentScores = getLocalLeaderboard();
            currentScores.push({ name: playerName, score: parseInt(playerScore) });
            localStorage.setItem(FALLBACK_BOX_ID, JSON.stringify(currentScores));
            renderLeaderboard();
        }

        // Initialize Leaderboard Display
        renderLeaderboard();


        // --- PRO LEVEL SNAKE ENGINE ---
        const canvas = document.getElementById("snake-canvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}];
        let dx = grid, dy = 0;
        let food = {x: 300, y: 200};
        let score = 0;
        let gameInterval;

        function mainSnake() {
            if (hasGameEnded()) {
                clearInterval(gameInterval);
                let name = prompt(`🔥 Game Over! Score: ${score}. Leaderboard me apna naam darj karein:`);
                if (name) {
                    saveScore(name, score);
                }
                resetSnake();
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#05060c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#ff007f' : '#b5005a';
                ctx.strokeStyle = '#000';
                ctx.fillRect(part.x, part.y, grid-2, grid-2);
                ctx.strokeRect(part.x, part.y, grid-2, grid-2);
            });
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('snake-score').innerText = score;
                genFood();
            } else {
                snake.pop();
            }
        }

        function genFood() {
            food.x = Math.floor(Math.random() * (canvas.width/grid)) * grid;
            food.y = Math.floor(Math.random() * (canvas.height/grid)) * grid;
        }

        function drawFood() {
            ctx.fillStyle = '#00f3ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00f3ff';
            ctx.fillRect(food.x, food.y, grid-2, grid-2);
            ctx.shadowBlur = 0; // reset
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeft = snake[0].x < 0;
            const hitRight = snake[0].x >= canvas.width;
            const hitTtop = snake[0].y < 0;
            const hitBottom = snake[0].y >= canvas.height;
            return hitLeft || hitRight || hitTtop || hitBottom;
        }

        function resetSnake() {
            snake = [{x: 160, y: 160}, {x: 140, y: 160}];
            dx = grid; dy = 0; score = 0;
            document.getElementById('snake-score').innerText = score;
            gameInterval = setInterval(mainSnake, 100);
        }

        // Controls Event Handlers
        function changeDirection(direction) {
            if (direction === 'UP' && dy === 0) { dx = 0; dy = -grid; }
            if (direction === 'DOWN' && dy === 0) { dx = 0; dy = grid; }
            if (direction === 'LEFT' && dx === 0) { dx = -grid; dy = 0; }
            if (direction === 'RIGHT' && dx === 0) { dx = grid; dy = 0; }
        }

        document.addEventListener("keydown", e => {
            if (e.key === "ArrowUp") changeDirection('UP');
            if (e.key === "ArrowDown") changeDirection('DOWN');
            if (e.key === "ArrowLeft") changeDirection('LEFT');
            if (e.key === "ArrowRight") changeDirection('RIGHT');
        });

        document.getElementById('dpad-up').addEventListener('click', () => changeDirection('UP'));
        document.getElementById('dpad-down').addEventListener('click', () => changeDirection('DOWN'));
        document.getElementById('dpad-left').addEventListener('click', () => changeDirection('LEFT'));
        document.getElementById('dpad-right').addEventListener('click', () => changeDirection('RIGHT'));

        gameInterval = setInterval(mainSnake, 100);


        // --- ADVANCED PRO CHESS ENGINE (DEPTH 3 MINMAX + ALPHA-BETA) ---
        let board = null;
        let game = new Chess();
        const statusEl = document.getElementById('chess-status');

        // Piece evaluation matrix for smarter calculations
        const weights = { p: 10, r: 50, n: 30, b: 30, q: 90, k: 9000 };

        function evaluateBoard(boardState) {
            let totalEvaluation = 0;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    let piece = boardState[i][j];
                    if (piece) {
                        let value = weights[piece.type];
                        totalEvaluation += (piece.color === 'w') ? value : -value;
                    }
                }
            }
            return totalEvaluation;
        }

        // Deep Level MinMax engine with alpha-beta pruning (Depth 3)
        function minimax(depth, gameObj, alpha, beta, isMaximizing) {
            if (depth === 0 || gameObj.game_over()) {
                return evaluateBoard(gameObj.board());
            }

            let moves = gameObj.moves();
            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let move of moves) {
                    gameObj.move(move);
                    let score = minimax(depth - 1, gameObj, alpha, beta, false);
                    gameObj.undo();
                    maxEval = Math.max(maxEval, score);
                    alpha = Math.max(alpha, score);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let move of moves) {
                    gameObj.move(move);
                    let score = minimax(depth - 1, gameObj, alpha, beta, true);
                    gameObj.undo();
                    minEval = Math.min(minEval, score);
                    beta = Math.min(beta, score);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }

        function getBestMove() {
            let moves = game.moves();
            let bestMove = null;
            let bestValue = Infinity; // Black wants to minimize the score

            // Depth 3 Setup
            for (let move of moves) {
                game.move(move);
                let boardValue = minimax(2, game, -Infinity, Infinity, true);
                game.undo();
                if (boardValue <= bestValue) {
                    bestValue = boardValue;
                    bestMove = move;
                }
            }
            return bestMove;
        }

        function makeAIMove() {
            let bestMove = getBestMove();
            if (bestMove) {
                game.move(bestMove);
                board.position(game.fen());
                updateStatus();
            }
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over() || piece.search(/^b/) !== -1) return false;
        }

        function onDrop(source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateStatus();
            window.setTimeout(makeAIMove, 250);
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function updateStatus() {
            let status = '';
            let moveColor = game.turn() === 'b' ? 'Black (AI)' : 'White (Aap)';

            if (game.in_checkmate()) {
                status = `Game Over! ${moveColor} checkmate ho gaya.`;
            } else if (game.in_draw()) {
                status = 'Game Over! Match Draw ho gaya.';
            } else {
                status = `${moveColor} ki chaal hai.`;
                if (game.in_check()) status += ' (CHECK!)';
            }
            statusEl.innerText = status;
        }

        function initChess() {
            if(!board) {
                board = Chessboard('chess-board', {
                    draggable: true,
                    position: 'start',
                    onDragStart: onDragStart,
                    onDrop: onDrop,
                    onSnapEnd: onSnapEnd
                });
            }
        }
    </script>
</body>
</html>
