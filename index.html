<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Zafar Games | Classic Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #1a1a24;
            --card-bg: #2d2d3a;
            --classic-green: #27ae60;
            --classic-blue: #2980b9;
            --classic-red: #c0392b;
            --classic-yellow: #f1c40f;
            --text-white: #ffffff;
            --text-gray: #bdc3c7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            overflow-x: hidden;
        }

        .main-site { display: block; }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #2c3e50;
            border-bottom: 3px solid var(--classic-yellow);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .hero {
            min-height: 20vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(44, 62, 80, 0.85), rgba(26, 26, 36, 0.95)), 
                        url('https://images.unsplash.com/photo-1611195974226-a6a9be9dd763?q=80&w=1000') no-repeat center center/cover;
            padding: 20px;
        }

        .hero h1 { font-size: 2.2rem; }
        .hero h1 span { color: var(--classic-yellow); }

        .container { padding: 25px 5%; }
        .section-title { text-align: center; font-size: 1.6rem; margin-bottom: 20px; text-transform: uppercase; }

        /* GAMES GRID */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .play-zone {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 3px solid #7f8c8d;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .play-zone.ludo-card { border-color: var(--classic-yellow); }
        .play-zone.chess-card { border-color: #d5dbdb; }

        .game-icon { font-size: 45px; margin-bottom: 10px; }

        .play-now-btn {
            display: inline-block;
            background: #e67e22;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 25px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            box-shadow: 0 4px 0 #d35400;
        }
        .play-now-btn:active { transform: translateY(4px); box-shadow: none; }

        .ludo-card .play-now-btn { background: var(--classic-yellow); color: #000; box-shadow: 0 4px 0 #f39c12; }
        .chess-card .play-now-btn { background: #f4f6f6; color: #000; box-shadow: 0 4px 0 #bdc3c7; }

        footer { text-align: center; padding: 15px; color: #7f8c8d; font-size: 12px; margin-top: 30px; }

        /* --- FULLSCREEN NATURAL GAME VIEW --- */
        .game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #2c3e50;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 5px;
        }

        .game-header {
            width: 100%;
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: #c0392b;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 3px 0 #962d22;
        }

        .score-board { font-size: 18px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; }

        #gameCanvas {
            background: #eed9b3; /* Rich natural wood/paper base tint */
            display: block;
            border-radius: 10px;
            border: 6px solid #8e44ad;
            width: 95vw;
            height: 48vh; 
        }

        .runner-tips { font-size: 14px; color: #fff; text-align: center; margin: 5px 0; font-weight: 500; }

        /* CONTROLS */
        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 90vw;
            max-width: 280px;
            margin-bottom: 10px;
        }

        .control-btn {
            background: #34495e;
            border: none;
            color: #fff;
            font-size: 26px;
            padding: 12px 0;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 0 #2c3e50;
        }
        .control-btn:active { transform: translateY(4px); box-shadow: none; }

        .action-bar {
            display: none;
            width: 90vw;
            max-width: 320px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .action-btn {
            background: #27ae60;
            color: #fff;
            border: none;
            font-size: 18px;
            font-weight: bold;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 0 #1e8449;
            text-transform: uppercase;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div class="main-site" id="mainSite">
        <nav>
            <div class="logo">🎲 Zafar Classic Hub</div>
        </nav>

        <section class="hero">
            <h1>Zafar <span>Board Games</span></h1>
            <p>Traditional & Natural Gaming Hub</p>
        </section>

        <section class="container">
            <h2 class="section-title">Choose Game</h2>
            <div class="games-grid">
                
                <!-- GAME 1: NATURAL LUDO -->
                <div class="play-zone ludo-card">
                    <div class="game-icon">🎲</div>
                    <h3>Classic Ludo</h3>
                    <p style="color: var(--text-gray); font-size: 13px; margin-top:5px;">Traditional design board. Play vs Smart Bot or Pass & Play.</p>
                    <button class="play-now-btn" onclick="startLudo()">▶ Play Ludo</button>
                </div>

                <!-- GAME 2: ROYAL CHESS -->
                <div class="play-zone chess-card">
                    <div class="game-icon">👑</div>
                    <h3>Royal Wood Chess</h3>
                    <p style="color: var(--text-gray); font-size: 13px; margin-top:5px;">Classic wooden design with real chess figures vs Computer.</p>
                    <button class="play-now-btn" onclick="startChess()">▶ Play Chess</button>
                </div>

            </div>
        </section>

        <footer>ZAFAR ARCADE | &copy; 2026</footer>
    </div>


    <!-- FULLSCREEN GAME VIEW -->
    <div class="game-screen" id="gameScreen">
        <div class="game-header">
            <button class="back-btn" onclick="exitGame()">⬅ Leave</button>
            <div class="score-board" id="scoreWrapper">Turn: <span id="scoreText">-</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div class="runner-tips" id="gameTips">Loading...</div>

        <!-- Touch Controls Pad (Hidden for board games, kept safe) -->
        <div class="mobile-controls" id="controlPad" style="display:none;">
            <button class="control-btn up" id="btnUp">▲</button>
            <button class="control-btn left" id="btnLeft">◀</button>
            <button class="control-btn right" id="btnRight">▶</button>
            <button class="control-btn down" id="btnDown">▼</button>
        </div>

        <!-- Action Bar for Ludo Dice Roll -->
        <div class="action-bar" id="actionBar">
            <button class="action-btn" id="mainActionBtn" onclick="handleActionClick()">🎲 Roll Dice</button>
        </div>
    </div>


    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let currentImgMode = ""; 
        let ludoTurn = 0; // 0: Player, 1: Bot
        let diceValue = 1;
        
        let pRed = { pos: 0, color: "#e74c3c" };   // Real Classic Crimson Red
        let pBot = { pos: 0, color: "#2ecc71" };   // Real Classic Grass Green

        // Pure traditional layout path matrix for mini-board
        const ludoPath = [
            {cx:1, cy:2}, {cx:2, cy:2}, {cx:3, cy:2}, {cx:4, cy:2}, {cx:4, cy:1}, {cx:4, cy:0},
            {cx:5, cy:0}, {cx:5, cy:1}, {cx:5, cy:2}, {cx:6, cy:2}, {cx:7, cy:2}, {cx:7, cy:3},
            {cx:7, cy:4}, {cx:6, cy:4}, {cx:5, cy:4}, {cx:5, cy:5}, {cx:5, cy:6}, {cx:4, cy:6},
            {cx:4, cy:5}, {cx:4, cy:4}, {cx:3, cy:4}, {cx:2, cy:4}, {cx:1, cy:4}, {cx:1, cy:3}
        ];

        // Traditional Chess pieces setup using standard Unicode icons
        let selectedPiece = null;
        let chessTurn = "player";
        let chessBoard = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'],
            ['♟','♟','♟','♟','♟','♟','♟','♟'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],
            ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }

        function showScreen() {
            document.getElementById("mainSite").style.display = "none";
            document.getElementById("gameScreen").style.display = "flex";
            resizeCanvas();
        }

        function exitGame() {
            currentImgMode = "";
            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("mainSite").style.display = "block";
        }

        // --- LUDO SETUP ---
        function startLudo() {
            currentImgMode = "ludo";
            canvas.style.borderColor = "#f1c40f"; // Wood/Gold border
            document.getElementById("scoreWrapper").innerHTML = `Turn: <span id="scoreText" style="color:#e74c3c">Your Turn</span>`;
            document.getElementById("gameTips").innerText = "Click 'Roll Dice' to roll and step forward.";
            document.getElementById("actionBar").style.display = "flex";
            pRed.pos = 0; pBot.pos = 0; ludoTurn = 0;
            showScreen();
            drawLudoBoard();
        }

        function handleActionClick() {
            if (currentImgMode === "ludo" && ludoTurn === 0) {
                diceValue = getRandomInt(1, 7);
                document.getElementById("gameTips").innerText = `You rolled a beautiful ${diceValue}!`;
                pRed.pos += diceValue;
                
                if (pRed.pos >= ludoPath.length) {
                    alert("🏆 Mubarak ho! Aapne computer bot ko hara diya!");
                    pRed.pos = 0; pBot.pos = 0;
                }
                
                ludoTurn = 1;
                document.getElementById("scoreText").innerText = "Bot's Turn...";
                document.getElementById("scoreText").style.color = "#2ecc71";
                drawLudoBoard();

                // Natural delay for computer turn
                setTimeout(() => {
                    let botDice = getRandomInt(1, 7);
                    pBot.pos += botDice;
                    document.getElementById("gameTips").innerText = `Bot rolled a ${botDice}!`;
                    
                    if (pBot.pos >= ludoPath.length) {
                        alert("🤖 Oh! Computer Jeet Gaya. Agli baar pakka harana!");
                        pRed.pos = 0; pBot.pos = 0;
                    }
                    
                    ludoTurn = 0;
                    document.getElementById("scoreText").innerText = "Your Turn";
                    document.getElementById("scoreText").style.color = "#e74c3c";
                    drawLudoBoard();
                }, 1000);
            }
        }

        function drawLudoBoard() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            canvas.style.background = "#f4f6f6"; // Light premium board paper tint

            let size = Math.min(canvas.width, canvas.height) / 9;
            let startX = (canvas.width - size * 9) / 2;
            let startY = (canvas.height - size * 7) / 2;

            // Draw clean traditional colorful blocks
            ludoPath.forEach((cell, index) => {
                ctx.strokeStyle = "#7f8c8d";
                ctx.lineWidth = 1.5;

                // Color themes based on path locations
                if(index < 4) ctx.fillStyle = "#fadbd8"; // soft red path
                else if(index >= 6 && index < 10) ctx.fillStyle = "#d4efdf"; // soft green path
                else if(index === ludoPath.length - 1) ctx.fillStyle = "#fdebd0"; // Yellow Goal box
                else ctx.fillStyle = "#ffffff";

                let cx = startX + cell.cx * size;
                let cy = startY + cell.cy * size;
                ctx.fillRect(cx, cy, size, size);
                ctx.strokeRect(cx, cy, size, size);
            });

            // Gootiyan design (Traditional Solid Circles with borders)
            let redCell = ludoPath[pRed.pos % ludoPath.length];
            let botCell = ludoPath[pBot.pos % ludoPath.length];

            // Player Token
            let rx = startX + redCell.cx*size + size/2;
            let ry = startY + redCell.cy*size + size/2;
            ctx.fillStyle = pRed.color;
            ctx.beginPath(); ctx.arc(rx, ry, size/3, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();

            // Bot Token
            let bx = startX + botCell.cx*size + size/2;
            let by = startY + botCell.cy*size + size/2;
            ctx.fillStyle = pBot.color;
            ctx.beginPath(); ctx.arc(bx, by, size/3, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
        }

        // --- CHESS SETUP ---
        function startChess() {
            currentImgMode = "chess";
            canvas.style.borderColor = "#d5dbdb";
            document.getElementById("scoreWrapper").innerHTML = `Turn: <span id="scoreText" style="color:#f39c12">Your Turn (White)</span>`;
            document.getElementById("gameTips").innerText = "Tap your white piece, then tap an empty tile to move.";
            document.getElementById("actionBar").style.display = "none";
            selectedPiece = null; chessTurn = "player";
            showScreen();
            drawChessBoard();

            // Handling pure natural tap clicks for moving figures
            canvas.onclick = function(e) {
                if (currentImgMode !== "chess" || chessTurn !== "player") return;
                let rect = canvas.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                
                let boardSize = Math.min(canvas.width, canvas.height);
                let cellSize = boardSize / 8;
                let startX = (canvas.width - boardSize) / 2;
                let startY = (canvas.height - boardSize) / 2;

                let col = Math.floor((x - startX) / cellSize);
                let row = Math.floor((y - startY) / cellSize);

                if (col >= 0 && col < 8 && row >= 0 && row < 8) {
                    let piece = chessBoard[row][col];
                    
                    if (selectedPiece) {
                        // Move piece execution
                        chessBoard[selectedPiece.row][selectedPiece.col] = '';
                        chessBoard[row][col] = selectedPiece.type;
                        selectedPiece = null;
                        chessTurn = "bot";
                        document.getElementById("scoreText").innerText = "Computer thinking...";
                        document.getElementById("scoreText").style.color = "#c0392b";
                        drawChessBoard();

                        // Automated computer move
                        setTimeout(() => {
                            makeBotChessMove();
                            chessTurn = "player";
                            document.getElementById("scoreText").innerText = "Your Turn (White)";
                            document.getElementById("scoreText").style.color = "#f39c12";
                            drawChessBoard();
                        }, 800);
                    } else {
                        // Select White pieces (unicode representations for white are full blocks)
                        if (piece !== '' && ['♙','♖','♘','♗','♕','♔'].includes(piece)) {
                            selectedPiece = { row: row, col: col, type: piece };
                            drawChessBoard();
                        }
                    }
                }
            };
        }

        function makeBotChessMove() {
            // Finding black pieces targets
            let botPieces = [];
            const blackSet = ['♟','♜','♞','♝','♛','♚'];
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if (chessBoard[r][c] !== '' && blackSet.includes(chessBoard[r][c])) {
                        botPieces.push({row: r, col: c, type: chessBoard[r][c]});
                    }
                }
            }
            if (botPieces.length > 0) {
                let pick = botPieces[getRandomInt(0, botPieces.length)];
                let nextRow = pick.row + 1;
                if (nextRow < 8 && chessBoard[nextRow][pick.col] === '') {
                    chessBoard[pick.row][pick.col] = '';
                    chessBoard[nextRow][pick.col] = pick.type;
                }
            }
        }

        function drawChessBoard() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let boardSize = Math.min(canvas.width, canvas.height);
            let cellSize = boardSize / 8;
            let startX = (canvas.width - boardSize) / 2;
            let startY = (canvas.height - boardSize) / 2;

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    // Premium Classic Wooden Tiles Color Combo
                    ctx.fillStyle = (r + c) % 2 === 0 ? "#f0d9b5" : "#b58863"; 
                    
                    // Highlight selected piece tile softly
                    if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
                        ctx.fillStyle = "#3498db";
                    }

                    ctx.fillRect(startX + c * cellSize, startY + r * cellSize, cellSize, cellSize);
                    
                    let piece = chessBoard[r][c];
                    if (piece !== '') {
                        // Drawing real solid aesthetic colors for chess figures
                        ctx.fillStyle = ['♙','♖','♘','♗','♕','♔'].includes(piece) ? "#ffffff" : "#2c3e50";
                        
                        // Traditional sharp black outline for white pieces so they pop on light tiles
                        if(ctx.fillStyle === "#ffffff") {
                            ctx.strokeStyle = "#000000";
                            ctx.lineWidth = 1.5;
                        }
                        
                        ctx.font = `${cellSize * 0.65}px sans-serif`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        
                        let px = startX + c * cellSize + cellSize/2;
                        let py = startY + r * cellSize + cellSize/2;
                        
                        ctx.fillText(piece, px, py);
                        if(piece && ['♙','♖','♘','♗','♕','♔'].includes(piece)) {
                            ctx.strokeText(piece, px, py);
                        }
                    }
                }
            }
        }

        // MASTER ENGINE TRIGGER LOOP
        function masterLoop() {
            requestAnimationFrame(masterLoop);
            if (currentImgMode === "ludo") {
                drawLudoBoard();
            }
        }

        requestAnimationFrame(masterLoop);
    </script>
</body>
</html>
