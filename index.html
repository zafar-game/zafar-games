<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zafar Pro Gaming Engine</title>
    <!-- Chess Rules Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin: 0; }
        .header { margin: 20px 0; font-size: 28px; font-weight: bold; color: #60a5fa; }
        .btn-group { margin-bottom: 20px; }
        button { padding: 15px 30px; cursor: pointer; background: #334155; color: white; border: 1px solid #60a5fa; border-radius: 8px; font-size: 16px; margin: 0 10px; }
        button:hover { background: #60a5fa; }
        #gameCanvas { background: #fff; border: 5px solid #334155; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="header">Zafar Games | All-in-One</div>
    <div class="btn-group">
        <button onclick="startGame('LUDO')">Play Ludo</button>
        <button onclick="startGame('CHESS')">Play Chess</button>
    </div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function startGame(mode) {
            ctx.clearRect(0, 0, 600, 600);
            if(mode === 'LUDO') {
                drawLudoBoard();
            } else {
                drawChessBoard();
            }
        }

        function drawLudoBoard() {
            // Professional Ludo Grid Structure
            ctx.fillStyle = "#e53e3e"; ctx.fillRect(0,0,240,240); // Red
            ctx.fillStyle = "#38a169"; ctx.fillRect(360,0,240,240); // Green
            ctx.fillStyle = "#ecc94b"; ctx.fillRect(0,360,240,240); // Yellow
            ctx.fillStyle = "#3182ce"; ctx.fillRect(360,360,240,240); // Blue
            ctx.strokeStyle = "#000"; ctx.strokeRect(0,0,600,600);
        }

        function drawChessBoard() {
            const size = 75;
            for(let row=0; row<8; row++) {
                for(let col=0; col<8; col++) {
                    ctx.fillStyle = (row+col)%2===0 ? "#f0d9b5" : "#b58863";
                    ctx.fillRect(col*size, row*size, size, size);
                }
            }
        }
    </script>
</body>
</html>
