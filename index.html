<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Zafar Games | Ultimate Mobile Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --neon-green: #00ff99;
            --neon-blue: #00e5ff;
            --neon-pink: #ff0055;
            --neon-yellow: #ffe600;
            --text-white: #ffffff;
            --text-gray: #c5c6c7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* HOME SCREEN LAYOUT */
        .main-site { display: block; }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(31, 40, 51, 0.95);
            border-bottom: 1px solid rgba(0, 255, 153, 0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero {
            min-height: 22vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(11, 12, 16, 0.85), rgba(11, 12, 16, 0.95)), 
                        url('https://unsplash.com') no-repeat center center/cover;
            padding: 20px;
        }

        .hero h1 { font-size: 2rem; margin-bottom: 5px; }
        .hero h1 span { color: var(--neon-green); }

        .container { padding: 25px 5%; }
        .section-title { text-align: center; font-size: 1.6rem; margin-bottom: 20px; text-transform: uppercase; }

        /* GAMES GRID */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .play-zone {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid var(--neon-blue);
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .play-zone.snake-card { border-color: var(--neon-green); }

        .game-icon { font-size: 40px; margin-bottom: 10px; }

        .play-now-btn {
            display: inline-block;
            background: var(--neon-blue);
            color: #000;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 25px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            text-decoration: none;
        }
        .snake-card .play-now-btn { background: var(--neon-green); }

        footer { text-align: center; padding: 15px; color: #555; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div class="main-site" id="mainSite">
        <nav>
            <div class="logo">⚡ Zafar Games ⚡</div>
        </nav>

        <section class="hero">
            <h1>Zafar Arcade <span>Station</span></h1>
            <p>Premium High-Quality HTML5 Station</p>
        </section>

        <section class="container">
            <h2 class="section-title">Select Arcade Game</h2>
            <div class="games-grid">
                
                <!-- GAME 1: 3D CAR RACING -->
                <div class="play-zone runner-card" style="border-color: var(--neon-blue);">
                    <div class="game-icon">🏎️</div>
                    <h3 style="color: var(--neon-blue);">3D Car Racing</h3>
                    <p style="color: var(--text-gray); font-size: 13px; margin-top:5px;">High speed 3D racing simulator.</p>
                    <!-- Click karte hi browser script direct safety bypass window kholegi -->
                    <button class="play-now-btn" style="background: var(--neon-blue); color: #000;" onclick="openGameDirectly()">▶ Play Game</button>
                </div>

                <!-- GAME 2: SNAKE -->
                <div class="play-zone snake-card">
                    <div class="game-icon">🐍</div>
                    <h3>Snake Game V2</h3>
                    <p style="color: var(--text-gray); font-size: 13px; margin-top:5px;">Smooth and controlled mobile grid engine.</p>
                    <button class="play-now-btn" onclick="startSnake()">▶ Play</button>
                </div>

            </div>
        </section>

        <footer>
            &copy; Zafar Games. All rights reserved.
        </footer>
    </div>

    <script>
        function openGameDirectly() {
            // Yeh window browser security rules ko bypass karti hai aur direct loading screen open karti hai
            window.open("https://gd.games/games/b686375e-027f-48b2-ab95-3b817ebb4a33", "_blank");
        }

        function startSnake() {
            alert("Snake game chalu karne ka code yahan aayega.");
        }
    </script>
</body>
</html>
