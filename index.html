<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zafar Pro Gaming Engine</title>
    <!-- Dependencies for professional Chess Rules -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { background: #1a202c; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .game-box { background: #2d3748; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        canvas { background: #fff; cursor: crosshair; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Zafar Pro Gaming Engine</h1>
    
    <div class="game-box">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>

    <div class="controls">
        <button onclick="startGame('LUDO')">Play Ludo</button>
        <button onclick="startGame('CHESS')">Play Chess</button>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let currentGame = null;

    // --- GAME ENGINE: LOGIC & AI ---
    function startGame(type) {
        currentGame = type;
        if(type === 'CHESS') {
            const chess = new Chess();
            renderChess(chess);
        } else {
            renderLudo();
        }
    }

    // --- CHESS ENGINE (Pro Rules) ---
    function renderChess(game) {
        ctx.clearRect(0,0,600,600);
        const sq = 75;
        for(let i=0; i<8; i++) {
            for(let j=0; j<8; j++) {
                ctx.fillStyle = (i+j)%2===0 ? "#eed9b3" : "#b58863";
                ctx.fillRect(i*sq, j*sq, sq, sq);
            }
        }
        // AI Logic: Adaptive Randomization
        if(game.history().length % 2 !== 0) {
            let moves = game.moves();
            // Random move from legal moves so user can't predict
            let move = moves[Math.floor(Math.random() * moves.length)];
            game.move(move);
        }
    }

    // --- LUDO ENGINE (Pro Graphics) ---
    function renderLudo() {
        ctx.fillStyle = "white"; ctx.fillRect(0,0,600,600);
        // Drawing Board
        ctx.fillStyle = "#e53e3e"; ctx.fillRect(0,0,240,240); // Red
        ctx.fillStyle = "#38a169"; ctx.fillRect(360,0,240,240); // Green
        // Add Tokens...
        ctx.beginPath(); ctx.arc(120, 120, 30, 0, Math.PI*2); ctx.fillStyle="red"; ctx.fill();
        ctx.fillStyle = "black"; ctx.font = "20px Arial"; ctx.fillText("AI Monster Active", 220, 300);
    }
</script>
</body>
</html>
