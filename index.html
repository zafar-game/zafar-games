<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Zafar Games | Premium Mobile Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --neon-green: #00ff99;
            --neon-blue: #00e5ff;
            --neon-pink: #ff0055;
            --text-white: #ffffff;
            --text-gray: #c5c6c7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* HOME SCREEN LAYOUT */
        .main-site { display: block; }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(31, 40, 51, 0.95);
            border-bottom: 1px solid rgba(0, 255, 153, 0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero {
            min-height: 25vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(11, 12, 16, 0.85), rgba(11, 12, 16, 0.95)), 
                        url('https://images.unsplash.com/photo-1538481199705-c710c4e965fc?q=80&w=1920') no-repeat center center/cover;
            padding: 20px;
        }

        .hero h1 { font-size: 2rem; margin-bottom: 5px; }
        .hero h1 span { color: var(--neon-green); }

        .container { padding: 25px 5%; }
        .section-title { text-align: center; font-size: 1.6rem; margin-bottom: 20px; text-transform: uppercase; }

        /* GAMES GRID */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .play-zone {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid var(--neon-blue);
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .play-zone.snake-card { border-color: var(--neon-green); }

        .game-icon { font-size: 40px; margin-bottom: 10px; }

        .play-now-btn {
            display: inline-block;
            background: var(--neon-blue);
            color: #000;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 25px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            margin-top: 10px;
        }
        .snake-card .play-now-btn { background: var(--neon-green); }
        .runner-card .play-now-btn { background: var(--neon-pink); color: white; }

        .contact-box {
            background: var(--card-bg);
            max-width: 400px;
            margin: 30px auto 0 auto;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            text-align: center;
        }
        .contact-row { display: flex; justify-content: space-around; margin-top: 10px; }
        .compact-link { color: var(--text-white); text-decoration: none; font-size: 13px; font-weight: 600; }
        footer { text-align: center; padding: 15px; color: #555; font-size: 12px; margin-top: 30px; }

        /* --- FULLSCREEN MOB-OPTIMIZED SCREEN --- */
        .game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 5px;
        }

        .game-header {
            width: 100%;
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: #1f2833;
            color: #00e5ff;
            border: 1px solid #00e5ff;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
        }

        .score-board { font-size: 20px; font-weight: bold; color: var(--neon-green); }

        /* RESPONSIVE BIG CANVAS */
        #gameCanvas {
            background: #050508;
            display: block;
            border-radius: 10px;
            border: 2px solid var(--neon-green);
            width: 95vw;
            height: 45vh; /* Perfect mid-ratio for phone screens */
        }

        .runner-tips { font-size: 13px; color: var(--text-gray); text-align: center; margin: 5px 0; }

        /* BIGGER MOBILE CONTROLS FOR EASY TAP */
        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90vw;
            max-width: 280px;
            margin-bottom: 15px;
        }

        .control-btn {
            background: #111;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 28px;
            padding: 15px 0;
            border-radius: 15px;
            user-select: no-select;
            text-align: center;
            font-weight: bold;
        }
        .control-btn:active { background: var(--neon-blue); color: #000; }
        .control-btn.up { grid-column: 2; }
        .control-btn.left { grid-column: 1; }
        .control-btn.right { grid-column: 3; }
        .control-btn.down { grid-column: 2; }
    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div class="main-site" id="mainSite">
        <nav>
            <div class="logo">⚡ Zafar Games ⚡</div>
        </nav>

        <section class="hero">
            <h1>Zafar Arcade <span>Station</span></h1>
            <p>Mobile Optimized Gaming</p>
        </section>

        <section class="container">
            <h2 class="section-title">Select Game</h2>
            <div class="games-grid">
                
                <!-- GAME 1: SNAKE -->
                <div class="play-zone snake-card">
                    <div class="game-icon">🐍</div>
                    <h3>Snake Game V2</h3>
                    <p style="color: var(--text-gray); font-size: 13px;">Smooth and controlled speed for mobile.</p>
                    <button class="play-now-btn" onclick="startSnake()">▶ Play</button>
                </div>

                <!-- GAME 2: CYBER RUNNER -->
                <div class="play-zone runner-card">
                    <div class="game-icon">🏃‍♂️</div>
                    <h3 style="color: var(--neon-pink);">Cyber Runner (Infinity)</h3>
                    <p style="color: var(--text-gray); font-size: 13px;">Endless jump & crouch action game.</p>
                    <button class="play-now-btn" onclick="startRunner()">▶ Play</button>
                </div>

            </div>
        </section>

        <section class="container">
            <div class="contact-box">
                <h3 style="font-size: 15px; color: var(--neon-blue);">CONNECT</h3>
                <div class="contact-row">
                    <a href="https://www.instagram.com/skarman.exe" target="_blank" class="compact-link">📸 @skarman.exe</a>
                    <a href="mailto:info@zafargames.com" class="compact-link">📩 Send Email</a>
                </div>
            </div>
        </section>

        <footer>ZAFAR GAMES ARCADE | &copy; 2026</footer>
    </div>


    <!-- FULLSCREEN GAME VIEW -->
    <div class="game-screen" id="gameScreen">
        <div class="game-header">
            <button class="back-btn" onclick="exitGame()">⬅ Exit</button>
            <div class="score-board">Score: <span id="scoreText">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div class="runner-tips" id="gameTips">Controls Below:</div>

        <!-- Touch Controls -->
        <div class="mobile-controls" id="controlPad">
            <button class="control-btn up" id="btnUp">▲</button>
            <button class="control-btn left" id="btnLeft">◀</button>
            <button class="control-btn right" id="btnRight">▶</button>
            <button class="control-btn down" id="btnDown">▼</button>
        </div>
    </div>


    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let currentImgMode = ""; 
        let score = 0;
        let globalCount = 0;

        // --- SNAKE ENGINE VARIABLES ---
        let grid = 20;
        let snake = { x: 100, y: 100, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 200, y: 200 };

        // --- ENDLESS RUNNER ENGINE VARIABLES ---
        let runnerPlayer = { x: 40, y: 0, width: 25, height: 35, vy: 0, gravity: 0.8, isJumping: false, isDucking: false };
        let obstacles = [];
        let runnerSpeed = 3.5; // Kafi slow starting speed mobile ke liye
        let runnerActive = false;
        let groundY = 0;

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function resizeCanvas() {
            // Screen resolution fix dynamically mapping to layout css sizes
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            groundY = canvas.height - 30;
        }

        function showScreen() {
            document.getElementById("mainSite").style.display = "none";
            document.getElementById("gameScreen").style.display = "flex";
            resizeCanvas();
        }

        function exitGame() {
            runnerActive = false;
            currentImgMode = "";
            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("mainSite").style.display = "block";
        }

        // --- START SNAKE ---
        function startSnake() {
            currentImgMode = "snake";
            canvas.style.borderColor = "#00ff99";
            document.getElementById("scoreText").style.color = "#00ff99";
            document.getElementById("gameTips").innerText = "Use buttons to steer the snake.";
            document.getElementById("btnLeft").style.visibility = "visible";
            document.getElementById("btnRight").style.visibility = "visible";
            
            score = 0;
            document.getElementById("scoreText").innerText = score;
            showScreen();

            grid = 20;
            snake.x = Math.floor(canvas.width / 2 / grid) * grid;
            snake.y = Math.floor(canvas.height / 2 / grid) * grid;
            snake.dx = grid; snake.dy = 0;
            snake.cells = [{x: snake.x, y: snake.y}]; snake.maxCells = 4;
            resetApple();
        }

        function resetApple() {
            let cols = Math.floor(canvas.width / grid) - 1;
            let rows = Math.floor(canvas.height / grid) - 1;
            apple.x = getRandomInt(1, cols) * grid;
            apple.y = getRandomInt(1, rows) * grid;
        }

        // --- START CYBER RUNNER ---
        function startRunner() {
            currentImgMode = "runner";
            canvas.style.borderColor = "#ff0055";
            document.getElementById("scoreText").style.color = "#ff0055";
            document.getElementById("gameTips").innerText = "▲ to JUMP | ▼ to DUCK under high lasers";
            
            document.getElementById("btnLeft").style.visibility = "hidden";
            document.getElementById("btnRight").style.visibility = "hidden";

            score = 0;
            document.getElementById("scoreText").innerText = score;
            runnerSpeed = 3.5; // Controlled initial velocity
            obstacles = [];
            showScreen();

            runnerPlayer.y = groundY - 35; 
            runnerPlayer.vy = 0; runnerPlayer.isJumping = false; runnerPlayer.isDucking = false; runnerPlayer.height = 35;
            runnerActive = true;
        }

        // MAIN REFRESH ENGINE LOOP
        function masterLoop() {
            requestAnimationFrame(masterLoop);

            if (currentImgMode === "snake") {
                // MOBILE SPEED LOCK: Is framework counters ko 12 karne par snake slow aur manageable chalega
                if (++globalCount < 12) return; 
                globalCount = 0;

                ctx.clearRect(0,0,canvas.width,canvas.height);
                snake.x += snake.dx; snake.y += snake.dy;

                if (snake.x < 0) snake.x = canvas.width - grid;
                else if (snake.x >= canvas.width) snake.x = 0;
                if (snake.y < 0) snake.y = canvas.height - grid;
                else if (snake.y >= canvas.height) snake.y = 0;

                snake.cells.unshift({x: snake.x, y: snake.y});
                if (snake.cells.length > snake.maxCells) snake.cells.pop();

                // Apple Target
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(apple.x, apple.y, grid-1, grid-1);

                // Snake Processing
                ctx.fillStyle = '#00ff99';
                snake.cells.forEach(function(cell, index) {
                    ctx.fillRect(cell.x, cell.y, grid-1, grid-1);
                    if (cell.x === apple.x && cell.y === apple.y) {
                        snake.maxCells++; score += 10;
                        document.getElementById("scoreText").innerText = score;
                        resetApple();
                    }
                    for (let i = index + 1; i < snake.cells.length; i++) {
                        if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) startSnake(); 
                    }
                });
            } 
            
            else if (currentImgMode === "runner" && runnerActive) {
                // Frame skipping built-in filter to fix crazy high refreshrate speed burst errors
                if (++globalCount < 2) return;
                globalCount = 0;

                ctx.clearRect(0,0,canvas.width,canvas.height);

                // Neon Ground Line Layout draw
                ctx.strokeStyle = "#00e5ff"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

                // Physics gravity simulation scaling vectors
                runnerPlayer.y += runnerPlayer.vy;
                runnerPlayer.vy += runnerPlayer.gravity;

                let currentFloor = groundY - runnerPlayer.height;
                if (runnerPlayer.y >= currentFloor) {
                    runnerPlayer.y = currentFloor; runnerPlayer.vy = 0; runnerPlayer.isJumping = false;
                }

                // Draw Running Hero Sprite Box
                ctx.fillStyle = runnerPlayer.isDucking ? "#00ffff" : "#00e5ff";
                ctx.fillRect(runnerPlayer.x, runnerPlayer.y, runnerPlayer.width, runnerPlayer.height);

                // Obstacle Spawn distribution intervals
                if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - getRandomInt(150, 250)) {
                    let type = getRandomInt(0, 2); 
                    if (type === 0) {
                        obstacles.push({ x: canvas.width, y: groundY - 25, width: 20, height: 25, type: 0 });
                    } else {
                        obstacles.push({ x: canvas.width, y: groundY - 55, width: 22, height: 20, type: 1 }); 
                    }
                }

                // Draw obstacles frame vectors
                ctx.fillStyle = "#ff0055"; 
                obstacles.forEach((obs, index) => {
                    obs.x -= runnerSpeed;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                    if (!obs.passed && obs.x < runnerPlayer.x) {
                        obs.passed = true; score += 5;
                        document.getElementById("scoreText").innerText = score;
                        if (score % 30 === 0) runnerSpeed += 0.4; // Safe dynamic slow acceleration curve
                    }

                    // Mobile collision calculations
                    if (runnerPlayer.x < obs.x + obs.width &&
                        runnerPlayer.x + runnerPlayer.width > obs.x &&
                        runnerPlayer.y < obs.y + obs.height &&
                        runnerPlayer.y + runnerPlayer.height > obs.y) {
                        startRunner(); // instant restart state
                    }

                    if (obs.x < -30) obstacles.splice(index, 1);
                });
            }
        }

        // --- BUTTON HANDLING EVENTS ---
        function triggerJump() {
            if (currentImgMode === "runner" && !runnerPlayer.isJumping && !runnerPlayer.isDucking) {
                runnerPlayer.vy = -12.5; runnerPlayer.isJumping = true; // Perfect physics jump height
            }
        }
        function triggerDuckStart() {
            if (currentImgMode === "runner" && !runnerPlayer.isJumping) {
                runnerPlayer.isDucking = true; runnerPlayer.height = 18; 
            }
        }
        function triggerDuckEnd() {
            if (currentImgMode === "runner") {
                runnerPlayer.isDucking = false; runnerPlayer.height = 35;
            }
        }

        // Event hooks mapper setup for touch inputs
        document.getElementById("btnUp").addEventListener("touchstart", (e) => { e.preventDefault(); if (currentImgMode === "snake" && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; } else if (currentImgMode === "runner") triggerJump(); });
        document.getElementById("btnDown").addEventListener("touchstart", (e) => { e.preventDefault(); if (currentImgMode === "snake" && snake.dy === 0) { snake.dy = grid; snake.dx = 0; } else if (currentImgMode === "runner") triggerDuckStart(); });
        document.getElementById("btnDown").addEventListener("touchend", (e) => { e.preventDefault(); triggerDuckEnd(); });

        document.getElementById("btnLeft").addEventListener("touchstart", (e) => { e.preventDefault(); if(currentImgMode === "snake" && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; } });
        document.getElementById("btnRight").addEventListener("touchstart", (e) => { e.preventDefault(); if(currentImgMode === "snake" && snake.dx === 0) { snake.dx = grid; snake.dy = 0; } });

        // Backup PC Click inputs listeners map
        document.getElementById("btnUp").addEventListener("click", () => { if(currentImgMode === "runner") triggerJump(); });
        
        window.addEventListener('resize', resizeCanvas);
        requestAnimationFrame(masterLoop);
    </script>
</body>
</html>
