<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
 
<title>Mustafa Adventure</title>
 
<style>
 
*{
margin:0;
padding:0;
box-sizing:border-box;
}
 
body{
 
background:#000;
overflow:hidden;
font-family:Arial;
}
 
canvas{
 
display:block;
margin:auto;
background:linear-gradient(#55c8ff,#dff8ff);
 
}
 
</style>
 
</head>
 
<body>
 
<canvas id="game" width="1000" height="550"></canvas>
 
<script>
 
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
 
let player={
 
x:120,
 
y:380,
 
w:45,
 
h:60,
 
dx:0,
 
dy:0,
 
speed:6,
 
jump:-15,
 
ground:false
 
};
 
const gravity=0.8;
 
const keys={};
 
document.addEventListener("keydown",e=>{
 
keys[e.key]=true;
 
});
 
document.addEventListener("keyup",e=>{
 
keys[e.key]=false;
 
});
 
function update(){
 
player.dx=0;
 
if(keys["ArrowLeft"]||keys["a"]){
 
player.dx=-player.speed;
 
}
 
if(keys["ArrowRight"]||keys["d"]){
 
player.dx=player.speed;
 
}
 
if((keys["ArrowUp"]||keys["w"]||keys[" "])&&player.ground){
 
player.dy=player.jump;
 
player.ground=false;
 
}
 
player.x+=player.dx;
 
player.dy+=gravity;
 
player.y+=player.dy;
 
if(player.y+player.h>=500){
 
player.y=500-player.h;
 
player.dy=0;
 
player.ground=true;
 
}
 platforms.forEach(p=>{

if(
player.x+player.w>p.x &&
player.x<p.x+p.w &&
player.y+player.h>=p.y &&
player.y+player.h<=p.y+20 &&
player.dy>=0
){

player.y=p.y-player.h;
player.dy=0;
player.ground=true;

}

});enemies.forEach(e=>{

e.x+=2*e.dir;

if(e.x<800) e.dir=1;

if(e.x>1100) e.dir=-1;

});
}
let cameraX=0;
 
const coins=[
{x:500,y:450,collected:false},
{x:650,y:450,collected:false},
{x:820,y:450,collected:false},
{x:980,y:450,collected:false},
{x:1300,y:450,collected:false},
{x:1500,y:380,collected:false}
];
 function collectCoins(){

coins.forEach(c=>{

if(!c.collected){

if(
player.x < c.x+10 &&
player.x+player.w > c.x-10 &&
player.y < c.y+10 &&
player.y+player.h > c.y-10
){

c.collected=true;
score+=10;

}

}

});

}
const platforms=[
{x:700,y:430,w:150,h:20},
{x:1050,y:360,w:150,h:20},
{x:1450,y:300,w:180,h:20}
];
 
const trees=[
{x:300},
{x:900},
{x:1700},
{x:2300}
];
 
let score=0;
 let lives=3;

const enemies=[
{
x:900,
y:460,
w:40,
h:40,
dir:1
},
{
x:1700,
y:460,
w:40,
h:40,
dir:-1
}
];
  const finishFlag={
x:2500,
y:340,
w:20,
h:160
};
function draw(){cameraX+=(player.x-250-cameraX)*0.08;
 
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.save();
 
ctx.translate(-cameraX,0);
ctx.fillStyle="#79d45d";
 
ctx.fillRect(0,500,5000,50);
// Trees
 
trees.forEach(tree=>{
 
ctx.fillStyle="#7a4516";
 
ctx.fillRect(tree.x,410,20,90);
 
ctx.fillStyle="#0c8f2d";
 
ctx.beginPath();
 
ctx.arc(tree.x+10,390,40,0,Math.PI*2);
 
ctx.fill();
 
});
 ctx.fillStyle="#888";

ctx.fillRect(1900,430,80,70);

ctx.fillStyle="#444";

ctx.fillRect(1920,390,40,40);

ctx.fillStyle="#222";

ctx.fillRect(1910,450,20,50);

ctx.fillRect(1950,450,20,50);
// Platforms
 
ctx.fillStyle="#704214";
 
platforms.forEach(p=>{
 
ctx.fillRect(p.x,p.y,p.w,p.h);
 
});
                ctx.fillStyle="red";

enemies.forEach(e=>{

ctx.beginPath();

ctx.arc(e.x+20,e.y+20,20,0,Math.PI*2);

ctx.fill();

ctx.fillStyle="#fff";

ctx.beginPath();

ctx.arc(e.x+12,e.y+15,3,0,Math.PI*2);

ctx.fill();

ctx.beginPath();

ctx.arc(e.x+28,e.y+15,3,0,Math.PI*2);

ctx.fill();

ctx.fillStyle="red";

});
 coins.forEach(c=>{
enemies.forEach(e=>{

if(

player.x<e.x+e.w &&

player.x+player.w>e.x &&

player.y<e.y+e.h &&

player.y+player.h>e.y

){

lives--;

player.x=120;

player.y=380;

player.dy=0;

if(lives<=0){

alert("GAME OVER");

location.reload();

}

}

});
if(
!c.collected &&
player.x+player.w>c.x-10 &&
player.x<c.x+10 &&
player.y+player.h>c.y-10 &&
player.y<c.y+10
){

c.collected=true;

score+=10;

}

});
 // Finish Flag

ctx.fillStyle="#777";

ctx.fillRect(
finishFlag.x,
finishFlag.y,
finishFlag.w,
finishFlag.h
);

ctx.fillStyle="red";

ctx.beginPath();

ctx.moveTo(finishFlag.x+20,finishFlag.y);

ctx.lineTo(finishFlag.x+90,finishFlag.y+30);

ctx.lineTo(finishFlag.x+20,finishFlag.y+60);

ctx.closePath();

ctx.fill();               
// Coins
 
coins.forEach(c=>{
 
if(!c.collected){
 
ctx.fillStyle="gold";
 
ctx.beginPath();
 
ctx.arc(c.x,c.y,10,0,Math.PI*2);
 
ctx.fill();
 
}
 
});
ctx.fillStyle="#7b4a1b";
 
ctx.fillRect(0,495,5000,5);
 
ctx.fillStyle="#00aaff";
 
ctx.fillRect(player.x,player.y,player.w,player.h);
 
ctx.fillStyle="#fff";
 
ctx.beginPath();
 
ctx.arc(player.x+15,player.y+20,4,0,Math.PI*2);
 
ctx.fill();
 
ctx.beginPath();
 
ctx.arc(player.x+30,player.y+20,4,0,Math.PI*2);
 
ctx.fill();
 
ctx.fillStyle="#000";
 
ctx.fillRect(player.x+15,player.y+38,15,3);
 
ctx.fillStyle="#fff";
 
ctx.font="24px Arial";
 
ctx.fillText("Mustafa Adventure - Part 1",20,35);
 
ctx.font="18px Arial";
 
ctx.fillStyle="#fff";

ctx.font="24px Arial";
ctx.fillText("Mustafa Adventure - Part 1",20,35);

ctx.font="18px Arial";
ctx.fillText("Move : ← →   Jump : SPACE",20,65);

ctx.font="20px Arial";
ctx.fillText("Score : "+score,20,95);

ctx.fillText("Lives : "+lives,20,125);

ctx.restore();
}
 
function game(){

update();

collectCoins();

draw();

requestAnimationFrame(game);

}
 
game();
 
</script>
 
</body>
</html>
