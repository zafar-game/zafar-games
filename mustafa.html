<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mustafa Adventure | Pro Engine</title>
    <style>
        /* Mobile Responsive CSS Base */
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; background: linear-gradient(#2c3e50, #000); }
        .ui-layer { position: absolute; top: 10px; left: 10px; color: #fff; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui-layer">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // CORE ENGINE INITIALIZATION
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = true;

        // Canvas Responsive Resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // Game State Object
        const GameState = {
            score: 0,
            level: 1,
            cameraX: 0,
            paused: false
        };

        // Game Loop
        function gameLoop() {
            if (!gameActive) return;
            
            // Clear Screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Logic updates (To be added in next parts)
            
            requestAnimationFrame(gameLoop);
        }

        // Start Engine
        gameLoop();
        console.log("Part 1: Core Engine Loaded Successfully");
    </script>
</body>
</html>
