<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mustafa Adventure</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;
overflow:hidden;
font-family:Arial;
}

canvas{

display:block;
margin:auto;
background:linear-gradient(#55c8ff,#dff8ff);

}

</style>

</head>

<body>

<canvas id="game" width="1000" height="550"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={

x:120,

y:380,

w:45,

h:60,

dx:0,

dy:0,

speed:6,

jump:-15,

ground:false

};

const gravity=0.8;

const keys={};

document.addEventListener("keydown",e=>{

keys[e.key]=true;

});

document.addEventListener("keyup",e=>{

keys[e.key]=false;

});

function update(){

player.dx=0;

if(keys["ArrowLeft"]||keys["a"]){

player.dx=-player.speed;

}

if(keys["ArrowRight"]||keys["d"]){

player.dx=player.speed;

}

if((keys["ArrowUp"]||keys["w"]||keys[" "])&&player.ground){

player.dy=player.jump;

player.ground=false;

}

player.x+=player.dx;

player.dy+=gravity;

player.y+=player.dy;

if(player.y+player.h>=500){

player.y=500-player.h;

player.dy=0;

player.ground=true;

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#79d45d";

ctx.fillRect(0,500,1000,50);

ctx.fillStyle="#7b4a1b";

ctx.fillRect(0,495,1000,5);

ctx.fillStyle="#00aaff";

ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle="#fff";

ctx.beginPath();

ctx.arc(player.x+15,player.y+20,4,0,Math.PI*2);

ctx.fill();

ctx.beginPath();

ctx.arc(player.x+30,player.y+20,4,0,Math.PI*2);

ctx.fill();

ctx.fillStyle="#000";

ctx.fillRect(player.x+15,player.y+38,15,3);

ctx.fillStyle="#fff";

ctx.font="24px Arial";

ctx.fillText("Mustafa Adventure - Part 1",20,35);

ctx.font="18px Arial";

ctx.fillText("Move : ← →   Jump : SPACE",20,65);

}

function game(){

update();

draw();

requestAnimationFrame(game);

}

game();

</script>

</body>
</html>
