<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mustafa Adventure | Pro Engine</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; background: linear-gradient(#2c3e50, #000); }
        .ui-layer { position: absolute; top: 10px; left: 10px; color: #fff; pointer-events: none; font-size: 20px; }
    </style>
</head>
<body>

    <div class="ui-layer">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = true;

        // 1. Setup
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        // 2. Game Objects
        const GameState = { cameraX: 0 };
        const platforms = [
            { x: 0, y: 350, w: 2000, h: 50 },
            { x: 300, y: 250, w: 200, h: 20 },
            { x: 600, y: 180, w: 200, h: 20 }
        ];
        const player = { x: 100, y: 100, w: 40, h: 40, vx: 0, vy: 0, speed: 5, jumpStrength: -12, grounded: false, color: '#00ff99' };
        const keys = { right: false, left: false, up: false };

        // 3. Inputs
        window.addEventListener('keydown', e => {
            if(e.code === 'ArrowRight') keys.right = true;
            if(e.code === 'ArrowLeft') keys.left = true;
            if(e.code === 'Space' && player.grounded) { player.vy = player.jumpStrength; player.grounded = false; }
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'ArrowRight') keys.right = false;
            if(e.code === 'ArrowLeft') keys.left = false;
        });

        // 4. Functions
        function updatePlayer() {
            player.vx = keys.right ? player.speed : (keys.left ? -player.speed : 0);
            player.vy += 0.6;
            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;
            platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }
            });
        }

        function updateCamera() { if (player.x > canvas.width / 2) GameState.cameraX = player.x - canvas.width / 2; }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffcc00';
            platforms.forEach(p => ctx.fillRect(p.x - GameState.cameraX, p.y, p.w, p.h));
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x - GameState.cameraX, player.y, player.w, player.h);
        }

        // 5. Loop
        function gameLoop() {
            if (!gameActive) return;
            updatePlayer();
            updateCamera();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
